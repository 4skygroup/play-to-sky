name: Pipeline DevSecOps Complet (Scan + Build + Push)

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'

# 🔑 INDISPENSABLE : On autorise GitHub à publier l'image dans ton registre
permissions:
  contents: read
  packages: write

jobs:
  pipeline_securite:
    runs-on: ubuntu-latest

    steps:
      # --- ÉTAPE 1 : Préparation ---
      - name: Récupération du code source
        uses: actions/checkout@v4

      # --- ÉTAPE 2 : Chasse aux secrets (Gitleaks) ---
      - name: Scanner les mots de passe et clés API (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- ÉTAPE 3 : Analyse statique du code (Semgrep) ---
      - name: Scanner le code source multilingue (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

      # --- ÉTAPE 4 : Analyse des dépendances (Natif) ---
      - name: Vérifier les vulnérabilités npm (Natif)
        run: npm audit --audit-level=high
        continue-on-error: true 

      # --- ÉTAPE 5 : Le Triple Scan de Sécurité (Trivy) ---

      - name: 📦 Scan des dépendances (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      - name: 🐳 Scan de la config Docker (IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - name: 🐧 Scan de l'image Linux
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'node:alpine' 
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          # Si tu as créé un fichier .trivyignore, rajoute cette ligne :
          # trivyignore: .trivyignore

      # --- [NOUVELLE ÉTAPE] ÉTAPE 6 : Connexion au Registre GitHub (GHCR) ---
      - name: 🔐 Connexion au Registre GitHub Packages
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # # --- ÉTAPE 7 : Construction et Envoi (Version corrigée pour les majuscules) ---
      - name: 🚀 Build et Push de l'image sécurisée
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # On utilise "github.repository_owner" en minuscules
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          # Petit réglage pour forcer le passage en minuscules si besoin
      # --- ÉTAPE 8 : Déploiement Continu (CD) ---
      - name: Déployer sur Render en toute sécurité
        if: success() 
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}